  - Installation & Start: installation.md
  - Die Messdaten (TDMS): datenformate.md
  - Der Ablauf (Pipeline): pipeline.md
  - AutoWindow im Detail: autowindow.md
  - Physik & Fit: physik-und-fit.md
  - Bewertung der Fits: bewertung.md
  - Tuning – alle Stellschrauben: tuning.md
  - Troubleshooting: troubleshooting.md
  - Robustheits-Harness: test-harness.md
markdown_extensions:
  - admonition
  - attr_list
  - toc:
      permalink: true
  - tables
  - fenced_code
