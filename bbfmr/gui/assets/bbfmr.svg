<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- bbFMR-Logo: physikalisch korrektes LLG-Praezessionsdiagramm.
       Magnetisierung M praezediert auf einem Kegel um das effektive Feld H_eff
       (gemeinsamer Ursprung O); das transversale HF-Treiberfeld h steht senkrecht
       auf H. Vordere Bahnhaelfte durchgezogen, hintere gestrichelt (Tiefencue). -->
  <defs>
    <marker id="hHead" markerWidth="7" markerHeight="7" refX="5.2" refY="3" orient="auto">
      <path d="M0 0.4 L6 3 L0 5.6 Z" fill="#15233B"/>
    </marker>
    <marker id="mHead" markerWidth="7" markerHeight="7" refX="5.2" refY="3" orient="auto">
      <path d="M0 0.4 L6 3 L0 5.6 Z" fill="#CF3A24"/>
    </marker>
    <marker id="hfHead" markerWidth="6" markerHeight="6" refX="4.6" refY="2.6" orient="auto">
      <path d="M0 0.3 L5 2.6 L0 4.9 Z" fill="#2E4663"/>
    </marker>
    <marker id="omHead" markerWidth="6" markerHeight="6" refX="4.6" refY="2.6" orient="auto">
      <path d="M0 0.3 L5 2.6 L0 4.9 Z" fill="#15233B"/>
    </marker>
  </defs>

  <g fill="none" stroke-linecap="butt" stroke-linejoin="miter">
    <!-- Praezessionsbahn: hintere Haelfte (oben, ferner) gestrichelt -->
    <path d="M14 20 A18 6 0 0 1 50 20" stroke="#15233B" stroke-width="1.3"
          stroke-dasharray="2.4 2.2" opacity="0.9"/>
    <!-- Praezessionsbahn: vordere Haelfte (unten, naeher) durchgezogen; zugleich
         Pfeil fuer den Praezessionssinn omega (von M-Spitze rechts nach links) -->
    <path d="M50 20 A18 6 0 0 1 14 20" stroke="#15233B" stroke-width="1.6"
          marker-end="url(#omHead)"/>

    <!-- effektives Feld H_eff (Kegelachse, z) -->
    <line x1="32" y1="50" x2="32" y2="9" stroke="#15233B" stroke-width="2.1"
          marker-end="url(#hHead)"/>

    <!-- Magnetisierung M, gemeinsamer Ursprung O mit H, Spitze auf der Bahn -->
    <line x1="32" y1="50" x2="50" y2="20.4" stroke="#CF3A24" stroke-width="2.7"
          marker-end="url(#mHead)"/>
    <circle cx="50" cy="20" r="1.7" fill="#CF3A24" stroke="none"/>

    <!-- Ursprung O -->
    <circle cx="32" cy="50" r="1.5" fill="#15233B" stroke="none"/>

    <!-- transversales HF-Treiberfeld h senkrecht zu H -->
    <line x1="12" y1="50" x2="26" y2="50" stroke="#2E4663" stroke-width="1.8"
          marker-end="url(#hfHead)"/>
    <!-- Rechtwinkel-Marke (h _|_ H) -->
    <path d="M27 50 L27 45 L32 45" stroke="#2E4663" stroke-width="1.1" opacity="0.95"/>
  </g>
</svg>
