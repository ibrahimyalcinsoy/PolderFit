<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- PolderFit-Logo. © 2026 Ibrahim Yalcinsoy. Alle Rechte vorbehalten.
       Motiv: Breitband-FMR-Probenstab (Goldgestaenge, Helmholtz-Modulationsspulen,
       CPW-Platine mit Probe) ueber dem zugehoerigen Messsignal: S21-Resonanz
       (rot) und Lock-in-Ableitung dP/dH (blau) ueber dem statischen Feld.
       Die Feld-Marken liegen bei 9, 13 und 23 mT; die Resonanz sitzt bei 23. -->
  <metadata>PolderFit – Breitband-FMR-Auswertung. Copyright (c) 2026 Ibrahim Yalcinsoy.</metadata>
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#fbfaf6"/>
      <stop offset="100%" stop-color="#ece7da"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6b520f"/>
      <stop offset="28%" stop-color="#d4af37"/>
      <stop offset="50%" stop-color="#f9e7a0"/>
      <stop offset="72%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#5d470d"/>
    </linearGradient>
    <linearGradient id="goldFlansch" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7a5e12"/>
      <stop offset="45%" stop-color="#f3dd8e"/>
      <stop offset="100%" stop-color="#8a6a16"/>
    </linearGradient>
    <linearGradient id="keramik" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b9b3a2"/>
      <stop offset="45%" stop-color="#f2edde"/>
      <stop offset="100%" stop-color="#a8a290"/>
    </linearGradient>
    <linearGradient id="spule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7e1a1e"/>
      <stop offset="45%" stop-color="#c8393f"/>
      <stop offset="100%" stop-color="#6e1518"/>
    </linearGradient>
    <linearGradient id="pcb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a54b4"/>
      <stop offset="100%" stop-color="#16336f"/>
    </linearGradient>
    <linearGradient id="cpw" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5e29a"/>
      <stop offset="100%" stop-color="#c19a2e"/>
    </linearGradient>
  </defs>

  <rect x="1.5" y="1.5" width="509" height="509" rx="63" fill="url(#bg)" stroke="#d9d3c4" stroke-width="3"/>

  <!-- ===== Probenstab ===== -->
  <g>
    <!-- Gestaenge: obere und untere Goldschiene -->
    <rect x="46" y="128" width="426" height="22" rx="7" fill="url(#gold)"/>
    <rect x="46" y="238" width="426" height="22" rx="7" fill="url(#gold)"/>
    <!-- Schrauben -->
    <g fill="#7a5e12">
      <circle cx="96" cy="139" r="3"/><circle cx="418" cy="139" r="3"/>
      <circle cx="96" cy="249" r="3"/><circle cx="418" cy="249" r="3"/>
    </g>
    <!-- Flansch links (Steckverbinder-Seite) -->
    <rect x="22" y="112" width="16" height="164" rx="5" fill="url(#goldFlansch)"/>
    <rect x="42" y="118" width="12" height="152" rx="4" fill="url(#goldFlansch)"/>
    <!-- SMA-Leitungen (halbstarr) zur Platine -->
    <path d="M54 168 C 120 168, 160 158, 208 178" fill="none" stroke="#c9d2dd" stroke-width="3.4" stroke-linecap="round"/>
    <path d="M54 220 C 120 220, 160 230, 208 210" fill="none" stroke="#aeb8c6" stroke-width="3.4" stroke-linecap="round"/>

    <!-- Helmholtz-Spulenpaar auf Keramiktraegern -->
    <g id="spuleL">
      <rect x="176" y="118" width="14" height="152" rx="4" fill="url(#keramik)"/>
      <rect x="168" y="130" width="30" height="128" rx="9" fill="url(#spule)"/>
      <g stroke="#5c1114" stroke-width="2" opacity="0.75">
        <line x1="170" y1="142" x2="196" y2="142"/><line x1="170" y1="154" x2="196" y2="154"/>
        <line x1="170" y1="166" x2="196" y2="166"/><line x1="170" y1="178" x2="196" y2="178"/>
        <line x1="170" y1="190" x2="196" y2="190"/><line x1="170" y1="202" x2="196" y2="202"/>
        <line x1="170" y1="214" x2="196" y2="214"/><line x1="170" y1="226" x2="196" y2="226"/>
        <line x1="170" y1="238" x2="196" y2="238"/><line x1="170" y1="250" x2="196" y2="250"/>
      </g>
      <rect x="170" y="132" width="7" height="124" rx="3.5" fill="#ffffff" opacity="0.14"/>
    </g>
    <use href="#spuleL" x="146"/>

    <!-- CPW-Platine mit Probe zwischen den Spulen -->
    <g>
      <rect x="206" y="164" width="86" height="60" rx="4" fill="url(#pcb)" stroke="#0d1f4a" stroke-width="1.5"/>
      <!-- Masse-Leiter / Innenleiter des koplanaren Wellenleiters -->
      <rect x="210" y="174" width="78" height="5" rx="2" fill="url(#cpw)"/>
      <rect x="210" y="191" width="78" height="7" rx="2.5" fill="url(#cpw)"/>
      <rect x="210" y="210" width="78" height="5" rx="2" fill="url(#cpw)"/>
      <!-- Probe (Chip) auf dem Innenleiter -->
      <rect x="238" y="187" width="22" height="15" rx="2" fill="#23262b" stroke="#3c4148" stroke-width="1"/>
      <rect x="240" y="189" width="18" height="4" rx="1.5" fill="#48505a"/>
      <!-- Temperatursensor -->
      <circle cx="282" cy="218" r="3.2" fill="#b87333" stroke="#7a4a1e" stroke-width="1"/>
    </g>

    <!-- Stab nach rechts (zum Kryostaten) -->
    <rect x="452" y="150" width="34" height="88" rx="8" fill="url(#goldFlansch)"/>

    <!-- Gravur: Teilenummer (W·M·I = 23·13·9) -->
    <text x="366" y="253.5" font-family="Helvetica, Arial, sans-serif" font-size="10.5"
          letter-spacing="1.5" fill="#6e5610">23·13·9</text>
  </g>

  <!-- ===== Messsignal: S21 und dP/dH ueber dem Feld ===== -->
  <g>
    <!-- Feldachse, Marken bei 9, 13, 23 mT (x = 60 + 14*B) -->
    <line x1="60" y1="416" x2="452" y2="416" stroke="#5b6a85" stroke-width="2"/>
    <path d="M452 416 l-9 -4 v8 Z" fill="#5b6a85"/>
    <g stroke="#5b6a85" stroke-width="2">
      <line x1="186" y1="416" x2="186" y2="423"/>
      <line x1="242" y1="416" x2="242" y2="423"/>
      <line x1="382" y1="416" x2="382" y2="423"/>
    </g>
    <g font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#5b6a85" text-anchor="middle">
      <text x="186" y="440">9</text>
      <text x="242" y="440">13</text>
      <text x="382" y="440">23</text>
    </g>
    <text x="452" y="440" font-family="Helvetica, Arial, sans-serif" font-size="13"
          fill="#5b6a85" text-anchor="end">µ₀H (mT)</text>

    <!-- dP/dH (blau, antisymmetrisch um die Resonanz bei 23) -->
    <path d="M64 352 C 200 352, 330 352, 352 352
             C 366 352, 370 318, 382 318
             C 394 318, 398 386, 412 386
             C 426 386, 430 352, 448 352"
          fill="none" stroke="#3a63c0" stroke-width="4" stroke-linecap="round"/>
    <!-- S21 (rot, Lorentz-Einbruch bei 23) -->
    <path d="M64 340 C 210 340, 336 341, 356 348
             C 372 354, 370 404, 382 404
             C 394 404, 392 354, 408 348
             C 424 342, 436 340, 448 340"
          fill="none" stroke="#d0433f" stroke-width="4.5" stroke-linecap="round"/>
    <g font-family="Helvetica, Arial, sans-serif" font-size="15" font-style="italic">
      <text x="72" y="330" fill="#d0433f">S₂₁</text>
      <text x="118" y="330" fill="#3a63c0">dP/dH</text>
    </g>
  </g>

  <!-- ===== Wortmarke ===== -->
  <text x="256" y="492" font-family="Helvetica, Arial, sans-serif" font-size="46"
        font-weight="600" letter-spacing="1.5" text-anchor="middle" fill="#2b2a24">PolderFit</text>
</svg>
